<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#9e3050">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="יומן היין">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍷</text></svg>">
<title>🍷 יומן היין שלי</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #15101a;
    --surface: #1e1824;
    --card: #28202f;
    --accent: #9e3050;
    --accent-light: #c44068;
    --gold: #cda050;
    --gold-light: #e0bb6e;
    --text: #ede4ea;
    --muted: #9a8e96;
    --border: #3d3245;
    --radius: 20px;
    --shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  body {
    font-family: 'Assistant', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 500px;
    margin: 0 auto;
    padding-bottom: env(safe-area-inset-bottom);
    position: relative;
    overflow-x: hidden;
  }

  .header { padding: 40px 24px 20px; text-align: right; position: relative; }
  .header h1 {
    font-size: 34px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header .sub { color: var(--muted); font-size: 15px; margin-top: 6px; }

  .header-btns {
    position: absolute;
    top: 40px;
    left: 24px;
    display: flex;
    gap: 10px;
  }
  .header-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--gold);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 20px;
    z-index: 10;
  }

  .main { padding: 0 20px 120px; }

  .mode-toggle {
    display: flex;
    background: var(--surface);
    padding: 5px;
    border-radius: 16px;
    margin-bottom: 28px;
    border: 1px solid var(--border);
  }
  .mode-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    font-family: inherit;
  }
  .mode-btn.active { background: var(--card); color: var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

  .scan-btn {
    width: 100%;
    padding: 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 19px;
    font-weight: 800;
    cursor: pointer;
    margin-bottom: 12px;
    box-shadow: 0 15px 35px rgba(158,48,80,0.35);
    font-family: inherit;
  }
  .gallery-btn {
    background: var(--card);
    color: var(--gold);
    box-shadow: none;
    border: 1px solid var(--border);
    font-size: 16px;
    padding: 18px;
    margin-bottom: 28px;
  }

  .search-bar {
    display: flex;
    gap: 12px;
    background: var(--card);
    border-radius: var(--radius);
    padding: 10px;
    border: 1px solid var(--border);
    margin-bottom: 28px;
    box-shadow: var(--shadow);
  }
  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 17px;
    padding: 12px;
    direction: rtl;
    font-family: inherit;
  }
  .search-go {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--gold);
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    flex-shrink: 0;
  }

  .filter-bar {
    display: flex;
    gap: 12px;
    background: var(--card);
    border-radius: 16px;
    padding: 8px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .filter-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    padding: 10px;
    direction: rtl;
    font-family: inherit;
  }
  .filter-clear {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 0 10px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--surface);
    border-radius: 18px;
    padding: 18px 10px;
    text-align: center;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--gold); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }

  .wine-list { display: flex; flex-direction: column; gap: 16px; }
  .wine-card {
    background: var(--card);
    border-radius: 22px;
    padding: 24px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .wine-card.open { border-color: var(--gold); background: var(--surface); }
  .wine-card.open .wine-details { display: block; }

  .wine-name { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .wine-winery { color: var(--muted); font-size: 14px; margin-bottom: 8px; font-weight: 600; }
  .wine-details { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); display: none; }
  
  .wine-thumb { width: 55px; height: 75px; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); flex-shrink: 0; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .info-pill {
    background: var(--surface);
    border-radius: 14px;
    padding: 14px;
    border: 1px solid rgba(61,50,69,0.6);
  }
  .info-pill .lbl { font-size: 10px; color: var(--muted); font-weight: 700; margin-bottom: 6px; }
  .info-pill .val { font-size: 14px; color: var(--text); font-weight: 600; }

  .type-badge {
    padding: 5px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 800;
    display: inline-block;
    margin-bottom: 12px;
  }
  .type-אדום { background: rgba(158,48,80,0.25); color: #e54b7a; border: 1px solid rgba(158,48,80,0.3); }
  .type-לבן { background: rgba(205,160,80,0.25); color: #e0bb6e; border: 1px solid rgba(205,160,80,0.3); }
  .type-רוזה { background: rgba(230,130,150,0.25); color: #f0a0b0; border: 1px solid rgba(230,130,150,0.3); }
  .type-כתום { background: rgba(210,140,60,0.25); color: #e0a050; border: 1px solid rgba(210,140,60,0.3); }
  .type-מבעבע { background: rgba(150,200,220,0.25); color: #a0d8e8; border: 1px solid rgba(150,200,220,0.3); }

  .stars { display: flex; gap: 6px; direction: ltr; margin: 15px 0; }
  .stars button { background: none; border: none; cursor: pointer; font-size: 36px; color: var(--border); transition: color 0.15s; }
  .stars button.active { color: var(--gold); }

  .loading { text-align: center; padding: 70px 24px; }
  .spinner {
    width: 64px; height: 64px;
    border: 5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    margin: 0 auto 30px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card, .user-card, .setup-card {
    background: var(--card);
    border-radius: 24px;
    padding: 30px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  
  .input-field {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; color: var(--text); padding: 18px; margin-top: 15px;
    font-family: inherit; font-size: 16px; outline: none; resize: vertical;
  }
  
  .save-btn {
    width: 100%; padding: 22px; background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--bg); border: none; border-radius: var(--radius); font-weight: 800; cursor: pointer; font-size: 18px;
    font-family: inherit; transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.85; }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .action-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--gold);
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .action-btn:active { transform: scale(0.96); }
  .action-btn.whatsapp { color: #25d366; border-color: rgba(37,211,102,0.3); }
  .action-btn.danger { color: var(--accent-light); border-color: rgba(196,64,104,0.3); }

  .back-btn {
    background: none;
    border: none;
    color: var(--muted);
    width: 100%;
    padding: 20px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    font-size: 15px;
  }

  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--bg);
    padding: 14px 28px;
    border-radius: 40px;
    font-weight: 800;
    z-index: 2000;
    animation: fadeInOut 3.5s forwards;
    text-align: center;
    max-width: 90%;
  }
  @keyframes fadeInOut { 
    0% { opacity: 0; transform: translate(-50%, 20px); }
    10% { opacity: 1; transform: translate(-50%, 0); }
    90% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -20px); }
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    opacity: 0.6;
    line-height: 1.8;
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

  .chat-section { margin-top: 10px; }
  .chat-messages { display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; max-height: 400px; overflow-y: auto; }
  .chat-msg {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 90%;
  }
  .chat-msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-left-radius: 16px; border-bottom-right-radius: 4px; }
  .chat-msg.bot { background: var(--surface); color: var(--text); border: 1px solid var(--border); align-self: flex-start; border-bottom-right-radius: 16px; border-bottom-left-radius: 4px; }
  .chat-input-row { display: flex; gap: 10px; }
  .chat-input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; color: var(--text); padding: 14px; font-family: inherit; font-size: 15px; outline: none; direction: rtl;
  }
  .chat-send {
    background: var(--gold); color: var(--bg); border: none; border-radius: 14px;
    width: 48px; height: 48px; font-size: 20px; cursor: pointer; flex-shrink: 0; font-weight: 800;
  }
  .chat-send:disabled { opacity: 0.4; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="header-btns">
    <button class="header-btn" onclick="showView('setupView')" title="הגדרות">⚙️</button>
    <button class="header-btn" id="exportBtn" onclick="exportCSV()" title="ייצוא ל-Excel" style="display:none">📊</button>
  </div>
  <h1>🍷 יומן היין שלי</h1>
  <p class="sub">צלם תווית → קבל את כל מה שצריך לדעת</p>
</div>

<div class="main">
  <div id="homeView">
    <div id="keyMissingAlert" class="hidden" style="padding:18px; background:rgba(158,48,80,0.15); border:1px solid var(--accent); border-radius:16px; margin-bottom:24px; font-size:14px; text-align:center; color: var(--accent-light); font-weight:600;">
      ⚠️ חסר מפתח API. הגדר מפתח בהגדרות כדי להתחיל.
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" id="btnPhoto" onclick="setMode('photo')">📸 צילום תווית</button>
      <button class="mode-btn" id="btnText" onclick="setMode('text')">⌨️ חיפוש ידני</button>
    </div>

    <div id="photoMode">
      <button class="scan-btn" onclick="document.getElementById('cameraInput').click()">📸 צלם תווית</button>
      <button class="scan-btn gallery-btn" onclick="document.getElementById('galleryInput').click()">🖼️ בחר מהגלריה</button>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)" />
      <input id="galleryInput" type="file" accept="image/*" style="display:none" onchange="handlePhoto(event)" />
    </div>

    <div id="textMode" class="hidden">
      <div class="search-bar">
        <input id="searchInput" class="search-input" placeholder='למשל: ירדן קברנה סוביניון 2019' onkeydown="if(event.key==='Enter')handleText()" />
        <button class="search-go" onclick="handleText()">✨</button>
      </div>
    </div>

    <div id="statsBar" class="stats"></div>

    <div id="filterSection" class="hidden">
      <div class="filter-bar">
        <input id="filterInput" class="filter-input" placeholder="🔍 חפש ביומן..." oninput="filterWines()" />
        <button class="filter-clear" onclick="clearFilter()">✕</button>
      </div>
    </div>

    <div id="wineList" class="wine-list"></div>
  </div>

  <div id="loadingView" class="hidden">
    <div class="loading">
      <div class="spinner"></div>
      <p style="font-weight:700; font-size: 18px;">רגע, בודק את הבקבוק...</p>
      <p style="color:var(--muted); font-size: 14px; margin-top: 10px;">קורא את התווית ומחפש מידע אמיתי ברשת</p>
    </div>
  </div>

  <div id="resultView" class="hidden"></div>

  <div id="setupView" class="hidden">
    <div class="setup-card">
      <h3 style="margin-bottom:12px; font-size: 20px;">הגדרות API</h3>
      <p style="font-size:14px; color:var(--muted); line-height:1.6">הזן מפתח API של Gemini מ-Google AI Studio. המפתח נשמר בדפדפן שלך בלבד.</p>
      <input type="password" id="userApiKey" class="input-field" placeholder="הכנס מפתח API (מתחיל ב-AIza)...">
      <button class="save-btn" style="margin-top:25px" onclick="saveApiKey()">שמור מפתח</button>
      <button onclick="showView('homeView')" class="back-btn">חזרה</button>
    </div>
  </div>

  <div style="text-align:center; padding:30px 20px; border-top:1px solid var(--border); color:var(--muted); font-size:13px; font-weight:600; opacity:0.7; direction:ltr">Powered by AI · Doron Sheribman</div>
</div>

<script>
// ========== CONFIG ==========
const envApiKey = ""; 
const API_VERSION = "v1beta";
const GEMINI_MODEL = "gemini-2.5-flash";
const STORAGE_KEY = 'wines_v6';
const API_KEY_STORAGE = 'wine_journal_api_key_v6';

// ========== STATE ==========
let wines = [];
let currentRating = 0;
let currentResult = null;
let currentImageData = null;

// ========== INIT ==========
function init() {
  // מיגרציה מגרסה ישנה
  const raw = localStorage.getItem(STORAGE_KEY) || localStorage.getItem('wines_v5') || '[]';
  wines = JSON.parse(raw);
  if (!localStorage.getItem(STORAGE_KEY)) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(wines));
  }
  // מיגרציה של מפתח API
  if (!localStorage.getItem(API_KEY_STORAGE) && localStorage.getItem('wine_journal_api_key_v5')) {
    localStorage.setItem(API_KEY_STORAGE, localStorage.getItem('wine_journal_api_key_v5'));
  }

  if (!envApiKey && !localStorage.getItem(API_KEY_STORAGE)) {
    document.getElementById('keyMissingAlert').classList.remove('hidden');
  }
  renderHome();
}

function getApiKey() {
  return envApiKey || localStorage.getItem(API_KEY_STORAGE) || "";
}

function saveApiKey() {
  const key = document.getElementById('userApiKey').value.trim();
  if (key) {
    localStorage.setItem(API_KEY_STORAGE, key);
    showToast("המפתח נשמר!");
    document.getElementById('keyMissingAlert').classList.add('hidden');
    showView('homeView');
  }
}

// ========== UI ==========
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerText = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function showView(id) {
  ['homeView', 'loadingView', 'resultView', 'setupView'].forEach(v => {
    document.getElementById(v).classList.toggle('hidden', v !== id);
  });
  if (id === 'setupView') {
    document.getElementById('userApiKey').value = localStorage.getItem(API_KEY_STORAGE) || "";
  }
  if (id === 'homeView') renderHome();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setMode(mode) {
  document.getElementById('photoMode').classList.toggle('hidden', mode !== 'photo');
  document.getElementById('textMode').classList.toggle('hidden', mode !== 'text');
  document.getElementById('btnPhoto').classList.toggle('active', mode === 'photo');
  document.getElementById('btnText').classList.toggle('active', mode === 'text');
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ========== PROMPTS ==========
const WINE_PROMPT_IMAGE = `You are a wine expert. You provide factual, verified information — not generic descriptions or taste adjectives.

STEP 0 — IMAGE QUALITY CHECK (DO THIS FIRST):
Can you clearly read the winery name AND wine name from the label?
- If blurry, dark, too small, or unreadable → STOP. Return ONLY: {"error": "התמונה לא ברורה מספיק. נסה לצלם שוב מקרוב ובתאורה טובה."}
- Do NOT guess from bottle shape or partial text. Only proceed if you can READ the name.

STEP 1 — READ THE LABEL:
- Vintage year from main label, neck label, capsule sticker, or back label. If not found → "N/A".
- Winery and wine name exactly as printed.
- Grape varieties only if stated. Otherwise "ככל הנראה" + inference.
- Series/tier if present (Reserve, Private Collection, etc).

STEP 2 — SEARCH THE WEB:
USE GOOGLE SEARCH to find real data about this specific wine:
- Winery website, tech sheet, wine databases (Vivino, Wine-Searcher, Wine Spectator)
- Actual barrel details (oak type, months, new/used %), grape percentages, winemaking notes
Base ALL analysis on verified facts. If data not found, write "לא נמצא מידע מאומת".

STEP 3 — ANALYZE (cross-reference all 5 factors):
Each factor affects the others. Do NOT analyze in isolation.

WRITING RULES:
- Hebrew, one sentence per field. STRICTLY one sentence — not two, not three.
- State FACTS and DATA only. No taste adjectives (not "רך", "פירותי", "אלגנטי", "מורכב", "עשיר", "עדין").
- Pattern: state the fact → then what it implies. Example: "12 חודשי אלון צרפתי חדש בסדרת Reserve — מה שמצביע על יין עם מורכבות גבוהה."
- If you infer something, state the basis for the inference.

Respond ONLY with valid JSON in Hebrew (no markdown, no backticks):
{
  "name": "שם היין כפי שמופיע על התווית",
  "winery": "שם היקב",
  "vintage": "שנה או N/A",
  "region": "אזור/מדינה",
  "grapes": "זנים + אחוזים אם נמצא",
  "series": "סדרה/דרגה, או ריק",
  "type": "אדום/לבן/רוזה/כתום/מבעבע",
  "analysis_region": "משפט אחד: עובדה על האזור + מה זה אומר ליין הזה בהצלבה עם הסדרה והזנים.",
  "analysis_grapes": "משפט אחד: הרכב מדויק אם נמצא + מה ההצלבה עם האזור והחבית אומרת.",
  "analysis_barrel": "משפט אחד: נתוני חבית מאומתים (סוג, חודשים, % חדשות). אם לא נמצא — כתוב.",
  "analysis_vintage": "משפט אחד: עובדות על הבציר באזור + מה זה אומר בהצלבה עם הזנים.",
  "analysis_series": "משפט אחד: מיקום בהיררכיה של היקב + מה זה אומר על רמת הברירה והטיפול.",
  "serving_tip": "טיפ אחד קצר ומעשי — על סמך נתונים אמיתיים",
  "drink_window": "מתי לשתות — על סמך נתונים אמיתיים"

// ========== API ==========
async function callGemini(payload) {
  const activeKey = getApiKey();
  if (!activeKey) {
    showView('setupView');
    throw new Error("Missing API Key");
  }

  const url = `https://generativelanguage.googleapis.com/${API_VERSION}/models/${GEMINI_MODEL}:generateContent?key=${activeKey}`;
  
  let delay = 1000;
  for (let i = 0; i < 3; i++) {
    try {
      const body = {
        contents: [{ role: "user", parts: payload }],
        tools: [{ google_search: {} }]
      };
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      
      if (!response.ok) {
        const errJson = await response.json().catch(() => ({}));
        throw new Error(errJson.error?.message || `שגיאת שרת (${response.status})`);
      }
      
      const data = await response.json();
      // עם grounding, הטקסט יכול להיות בכמה parts — מחפשים את הטקסט
      const parts = data.candidates?.[0]?.content?.parts || [];
      const text = parts.map(p => p.text || '').join('');
      if (!text) throw new Error("תגובה ריקה מהשרת");
      const jsonStr = text.replace(/```json|```/g, '').trim();
      return JSON.parse(jsonStr);
    } catch (err) {
      if (i === 2) throw err;
      await new Promise(r => setTimeout(r, delay));
      delay *= 2;
    }
  }
}

async function callGeminiRaw(payload) {
  const activeKey = getApiKey();
  if (!activeKey) throw new Error("Missing API Key");

  const url = `https://generativelanguage.googleapis.com/${API_VERSION}/models/${GEMINI_MODEL}:generateContent?key=${activeKey}`;
  const body = {
    contents: [{ role: "user", parts: payload }],
    tools: [{ google_search: {} }]
  };
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!response.ok) {
    const errJson = await response.json().catch(() => ({}));
    throw new Error(errJson.error?.message || `שגיאה (${response.status})`);
  }
  const data = await response.json();
  const parts = data.candidates?.[0]?.content?.parts || [];
  return parts.map(p => p.text || '').join('').trim() || 'לא הצלחתי למצוא תשובה.';
}

// ========== IMAGE HANDLING ==========
function resizeImage(dataUrl, maxSize = 300) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const w = Math.round(img.width * ratio);
      const h = Math.round(img.height * ratio);
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.5));
    };
    img.src = dataUrl;
  });
}

async function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  showView('loadingView');
  const reader = new FileReader();
  reader.onload = async () => {
    const base64Data = reader.result.split(',')[1];
    currentImageData = await resizeImage(reader.result);
    try {
      const result = await callGemini([
        { text: WINE_PROMPT_IMAGE },
        { inlineData: { mimeType: file.type, data: base64Data } }
      ]);
      if (result.error) {
        showToast(result.error);
        showView('homeView');
        return;
      }
      showResult(result);
    } catch (err) {
      showToast(`שגיאה: ${err.message}`);
      showView('homeView');
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

async function handleText() {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  
  currentImageData = null;
  showView('loadingView');
  try {
    const result = await callGemini([{ text: `${WINE_PROMPT_TEXT}\n\nהיין שהמשתמש מחפש: ${query}` }]);
    showResult(result);
  } catch (err) {
    showToast(`שגיאה: ${err.message}`);
    showView('homeView');
  }
}

function updateRating(r) {
  currentRating = r;
  document.querySelectorAll('#ratingInput button').forEach((b, i) => {
    b.innerText = (i < r ? '★' : '☆');
    b.classList.toggle('active', i < r);
  });
}

// ========== FOLLOW-UP CHAT ==========
async function askFollowUp() {
  const input = document.getElementById('chatInput');
  const btn = document.getElementById('chatSendBtn');
  const messages = document.getElementById('chatMessages');
  const question = input.value.trim();
  if (!question || !currentResult) return;

  // הצג שאלת המשתמש
  input.value = '';
  btn.disabled = true;
  messages.innerHTML += `<div class="chat-msg user">${esc(question)}</div>`;
  messages.innerHTML += `<div class="chat-msg bot" id="chatLoading" style="opacity:0.5">מחפש...</div>`;
  messages.scrollTop = messages.scrollHeight;

  try {
    const wineContext = JSON.stringify(currentResult);
    const systemPrompt = WINE_FOLLOWUP_SYSTEM.replace('{WINE_DATA}', wineContext);
    const answer = await callGeminiRaw([{ text: `${systemPrompt}\n\nשאלת המשתמש: ${question}` }]);
    
    const loading = document.getElementById('chatLoading');
    if (loading) loading.remove();

    messages.innerHTML += `<div class="chat-msg bot">${esc(answer)}</div>`;
  } catch (err) {
    const loading = document.getElementById('chatLoading');
    if (loading) loading.remove();
    messages.innerHTML += `<div class="chat-msg bot">${esc(err.message)}</div>`;
  }
  btn.disabled = false;
  messages.scrollTop = messages.scrollHeight;
}

// ========== SHARE & COPY ==========
function buildShareText(d) {
  let t = `🍷 ${d.name} | ${d.winery}`;
  if (d.vintage && d.vintage !== 'N/A') t += ` ${d.vintage}`;
  if (d.analysis_region) t += `\n\n🌍 אזור: ${d.analysis_region}`;
  if (d.analysis_grapes) t += `\n🍇 זנים: ${d.analysis_grapes}`;
  if (d.analysis_barrel) t += `\n🪵 חבית: ${d.analysis_barrel}`;
  if (d.analysis_vintage) t += `\n📅 בציר: ${d.analysis_vintage}`;
  if (d.analysis_series) t += `\n🏷️ סדרה: ${d.analysis_series}`;
  // תמיכה ביינות ישנים עם description
  if (!d.analysis_region && d.description) t += `\n\n${d.description}`;
  if (d.serving_tip) t += `\n\n💡 ${d.serving_tip}`;
  if (d.drink_window) t += `\n⏳ ${d.drink_window}`;
  return t;
}

async function copyAnalysis() {
  if (!currentResult) return;
  const text = buildShareText(currentResult);
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const el = document.createElement('textarea');
    el.value = text;
    el.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
  }
  showToast("הועתק!");
}

function shareWhatsApp() {
  if (!currentResult) return;
  window.open(`https://wa.me/?text=${encodeURIComponent(buildShareText(currentResult))}`, '_blank');
}

function shareWineFromList(id) {
  const w = wines.find(w => w.id === id);
  if (!w) return;
  window.open(`https://wa.me/?text=${encodeURIComponent(buildShareText(w.data))}`, '_blank');
}

// ========== SAVE ==========
function saveWine() {
  if (!currentResult) return;
  const notes = document.getElementById('userNotes')?.value || '';
  
  const entry = {
    id: Date.now(),
    data: currentResult,
    rating: currentRating,
    notes,
    date: new Date().toLocaleDateString('he-IL'),
    image: currentImageData || null
  };
  
  wines.unshift(entry);
  
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(wines));
  } catch {
    // אחסון מלא — שומר בלי תמונה
    entry.image = null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(wines));
  }
  
  showToast("נשמר ביומן!");
  currentImageData = null;
  currentResult = null;
  showView('homeView');
}

// ========== HOME ==========
function getTopItem(arr) {
  if (!arr.length) return '—';
  const freq = {};
  arr.forEach(v => { if (v) freq[v] = (freq[v] || 0) + 1; });
  const sorted = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  return sorted[0]?.[0] || '—';
}

function renderHome() {
  const list = document.getElementById('wineList');
  const stats = document.getElementById('statsBar');
  const filterSection = document.getElementById('filterSection');
  const exportBtn = document.getElementById('exportBtn');
  
  const count = wines.length;
  const rated = wines.filter(w => w.rating > 0);
  const avg = rated.length ? (rated.reduce((a, b) => a + b.rating, 0) / rated.length).toFixed(1) : '—';
  const topWinery = getTopItem(wines.map(w => w.data?.winery));
  
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-val">${count}</div><div class="stat-label">יינות</div></div>
    <div class="stat-card"><div class="stat-val">${avg}</div><div class="stat-label">דירוג ממוצע</div></div>
    <div class="stat-card"><div class="stat-val" title="${esc(topWinery)}">${count ? esc(topWinery) : '🥂'}</div><div class="stat-label">${count ? 'יקב מוביל' : 'לחיים!'}</div></div>
  `;

  filterSection.classList.toggle('hidden', count < 3);
  exportBtn.style.display = count >= 1 ? 'flex' : 'none';

  if (!count) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">🍷</div>היומן ריק.<br>צלם תווית של בקבוק כדי להתחיל!</div>`;
    return;
  }

  renderWineList(wines);
}

        <div style="flex:1; min-width:0">

          <div class="wine-winery">${esc(w.data.winery)} · ${esc(w.data.vintage)}</div>

      </div>
      <div class="wine-details">
        ${w.data.analysis_region ? `<p style="font-size:13px; line-height:1.6; color:var(--text); margin-bottom:6px"><span style="color:var(--gold)">🌍</span> ${esc(w.data.analysis_region)}</p>` : ''}

        ${w.data.analysis_barrel ? `<p style="font-size:13px; line-height:1.6; color:var(--text); margin-bottom:6px"><span style="color:var(--gold)">🪵</span> ${esc(w.data.analysis_barrel)}</p>` : ''}

        ${w.data.description ? `<p style="font-size:13px; line-height:1.6; color:var(--text); margin-bottom:6px">${esc(w.data.description)}</p>` : ''}
        ${w.data.serving_tip ? `<p style="font-size:13px; color:var(--muted); margin-top:10px">💡 ${esc(w.data.serving_tip)}</p>` : ''}

        <div style="margin-top:15px; padding:12px; background:var(--surface); border-radius:12px; border-right:4px solid var(--gold)">
          <div style="font-size:13px">${esc(w.notes) || 'אין הערות'}</div>

        </div>
        <div class="action-row">
          <button class="action-btn whatsapp" onclick="event.stopPropagation(); shareWineFromList(${w.id})">💬 שתף</button>
          <button class="action-btn danger" onclick="event.stopPropagation(); deleteWine(${w.id})">🗑️ מחק</button>
        </div>
      </div>
    </div>

// ========== FILTER ==========
function filterWines() {
  const q = document.getElementById('filterInput').value.trim().toLowerCase();
  if (!q) { renderWineList(wines); return; }
  const filtered = wines.filter(w => {
    const d = w.data;
    return [d.name, d.winery, d.vintage, d.region, d.grapes, d.type, d.series, d.analysis_region, d.analysis_grapes, d.description, w.notes]
      .join(' ').toLowerCase().includes(q);
  });
  renderWineList(filtered);
}

function clearFilter() {
  document.getElementById('filterInput').value = '';
  renderWineList(wines);
}

// ========== DELETE ==========
function deleteWine(id) {
  if (confirm("למחוק מהיומן?")) {
    wines = wines.filter(w => w.id !== id);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(wines));
    renderHome();
  }
}

// ========== EXPORT ==========
function exportCSV() {
  if (!wines.length) return;
  
  const headers = ['שם היין','יקב','בציר','סוג','סדרה','אזור','זנים','ניתוח אזור','ניתוח זנים','ניתוח חבית','ניתוח בציר','ניתוח סדרה','טיפ הגשה','חלון שתייה','דירוג','הערות','תאריך'];
  const rows = wines.map(w => [
    w.data.name, w.data.winery, w.data.vintage, w.data.type, w.data.series || '',
    w.data.region, w.data.grapes,
    w.data.analysis_region || w.data.description || '',
    w.data.analysis_grapes || '', w.data.analysis_barrel || '',
    w.data.analysis_vintage || '', w.data.analysis_series || '',
    w.data.serving_tip || '', w.data.drink_window || '',
    w.rating, w.notes || '', w.date
  ]);
  
  const csv = [headers, ...rows]
    .map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(','))
    .join('\n');
  
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `יומן_יין_${new Date().toLocaleDateString('he-IL').replace(/\./g, '-')}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast(`יוצא ${wines.length} יינות!`);
}
